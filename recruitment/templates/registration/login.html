<!DOCTYPE html>
<html>
<head>
    <title>Recruiter Login</title>
    <style>
        body { font-family: Arial, sans-serif; background: #f4f7f6; margin: 80px auto; max-width: 400px; }
        .container { background: white; padding: 40px; border-radius: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        h2 { text-align: center; color: #333; }
        input { width: 100%; padding: 10px; margin: 10px 0; border: 1px solid #ccc; border-radius: 4px; box-sizing: border-box; }
        button { width: 100%; padding: 12px; background: #2c3e50; color: white; border: none; border-radius: 4px; cursor: pointer; font-size: 16px; margin-top: 15px; }
        button:hover { background: #1a252f; }
    </style>
</head>
<body>
    <div class="container">
        <h2>Recruiter Login</h2>
        <form method="post">
            {% csrf_token %}
            {{ form.as_p }}
            <button type="submit">Login</button>
        </form>
    </div>
</body>
</html>
